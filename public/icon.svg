<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Subtle highlight -->
  <circle cx="140" cy="140" r="180" fill="#ffffff" opacity="0.08"/>
  <!-- Wallet/card icon -->
  <g transform="translate(96, 156)">
    <!-- Card body -->
    <rect x="0" y="0" width="320" height="200" rx="28" fill="url(#card)"/>
    <!-- Top accent stripe -->
    <rect x="0" y="40" width="320" height="44" fill="#0d9488" opacity="0.12"/>
    <!-- Chip -->
    <rect x="32" y="84" width="56" height="40" rx="8" fill="#f59e0b" opacity="0.9"/>
    <rect x="40" y="92" width="40" height="24" rx="3" fill="#fbbf24"/>
    <!-- Upward trend arrow -->
    <g transform="translate(196, 110)">
      <path d="M 0 50 L 24 26 L 48 38 L 80 6" stroke="#10b981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      <path d="M 64 6 L 80 6 L 80 22" stroke="#10b981" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    </g>
    <!-- Dollar sign -->
    <text x="160" y="180" font-family="Arial, sans-serif" font-size="56" font-weight="bold" fill="#0d9488" text-anchor="middle">$</text>
  </g>
</svg>
